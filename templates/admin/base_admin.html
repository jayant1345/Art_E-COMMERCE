{% extends "base.html" %}
{% block extra_css %}
<style>
  footer { display: none !important; }

  .admin-layout { display: flex; min-height: calc(100vh - 68px); }
  .admin-sidebar {
    width: 220px; flex-shrink: 0;
    background: var(--bg-2);
    border-right: 1px solid var(--border);
    padding: 1.4rem 0;
    position: sticky; top: 68px;
    height: calc(100vh - 68px);
    overflow-y: auto;
    box-shadow: 2px 0 8px rgba(30,48,80,0.04);
  }
  .sidebar-brand { padding: 0 1.5rem 1rem; border-bottom: 1px solid var(--border-lt); margin-bottom: 0.5rem; }
  .sidebar-brand-name { font-family: var(--font-serif); font-size: 1.2rem; font-weight: 700; color: var(--navy); }
  .sidebar-brand-name em { color: var(--amber); font-style: italic; }
  .sidebar-brand-sub { font-size: 0.62rem; font-weight: 600; color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase; margin-top: 0.1rem; }
  .sidebar-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); padding: 0.6rem 1.5rem 0.3rem; margin-top: 0.5rem; }
  .sidebar-link {
    display: flex; align-items: center; gap: 0.8rem;
    padding: 0.65rem 1.5rem;
    font-size: 0.83rem; font-weight: 500; color: var(--muted);
    transition: all 0.18s; border-left: 3px solid transparent;
  }
  .sidebar-link:hover { color: var(--navy); background: var(--bg-3); }
  .sidebar-link.active { color: var(--navy); background: #e8edf5; border-left-color: var(--navy); font-weight: 600; }
  .sidebar-link i { width: 16px; text-align: center; }
  .sidebar-logout { color: var(--rose) !important; }
  .sidebar-logout:hover { background: #fdf0ee !important; }

  .admin-main { flex: 1; padding: 1.8rem 2rem; background: var(--bg); }
  .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.4rem; padding-bottom: 1rem; border-bottom: 1px solid var(--border-lt); }
  .admin-header h1 { font-family: var(--font-serif); font-size: 1.6rem; font-weight: 700; color: var(--navy); }
  .admin-header p { color: var(--muted); font-size: 0.8rem; margin-top: 0.15rem; }

  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(175px,1fr)); gap: 0.9rem; margin-bottom: 1.4rem; }
  .stat-card {
    background: var(--bg-2); border: 1px solid var(--border-lt); border-radius: 10px;
    padding: 1.1rem 1.3rem; box-shadow: var(--shadow-sm);
    transition: box-shadow 0.2s, transform 0.2s;
  }
  .stat-card:hover { box-shadow: var(--shadow-md); transform: translateY(-2px); }
  .stat-icon { font-size: 1.1rem; margin-bottom: 0.7rem; }
  .stat-num { font-family: var(--font-serif); font-size: 2.1rem; font-weight: 700; color: var(--navy); }
  .stat-lbl { font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-top: 0.2rem; }

  .admin-table { width: 100%; border-collapse: collapse; font-size: 0.84rem; }
  .admin-table th {
    text-align: left; padding: 0.8rem 1rem;
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted); border-bottom: 2px solid var(--border); background: var(--bg-3);
  }
  .admin-table td { padding: 0.8rem 1rem; border-bottom: 1px solid var(--border-lt); vertical-align: middle; color: var(--text-2); }
  .admin-table tr:last-child td { border-bottom: none; }
  .admin-table tbody tr:hover td { background: var(--bg-3); }

  .badge {
    display: inline-block; padding: 0.2rem 0.65rem;
    font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; border-radius: 999px;
  }
  .badge-success { background: #e6f4ed; color: var(--sage); }
  .badge-warning { background: var(--amber-pale); color: var(--amber); }
  .badge-danger  { background: #fcecea; color: var(--rose); }
  .badge-info    { background: #e8edf5; color: var(--navy); }
  .badge-teal    { background: #e3f2f3; color: var(--teal); }

  {% block admin_css %}{% endblock %}
</style>
{% endblock %}

{% block content %}
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-name">Canvas<em>Culture Studio</em></div>
      <div class="sidebar-brand-sub">Admin Panel</div>
    </div>
    <div class="sidebar-label">Overview</div>
    <a href="{{ url_for('admin.dashboard') }}" class="sidebar-link {% if request.endpoint == 'admin.dashboard' %}active{% endif %}">
      <i class="fa fa-chart-bar"></i> Dashboard
    </a>
    <div class="sidebar-label">Catalogue</div>
    <a href="{{ url_for('admin.artworks') }}" class="sidebar-link {% if 'artwork' in request.endpoint %}active{% endif %}">
      <i class="fa fa-image"></i> Artworks
    </a>
    <a href="{{ url_for('admin.artists') }}" class="sidebar-link {% if 'artist' in request.endpoint %}active{% endif %}">
      <i class="fa fa-user"></i> Artists
    </a>
    <a href="{{ url_for('admin.categories') }}" class="sidebar-link {% if request.endpoint == 'admin.categories' %}active{% endif %}">
      <i class="fa fa-tag"></i> Categories
    </a>
    <div class="sidebar-label">Sales</div>
    <a href="{{ url_for('admin.orders') }}" class="sidebar-link {% if 'order' in request.endpoint %}active{% endif %}">
      <i class="fa fa-shopping-bag"></i> Orders
    </a>
    <div class="sidebar-label">Site</div>
    <a href="{{ url_for('admin.settings') }}" class="sidebar-link {% if request.endpoint == 'admin.settings' %}active{% endif %}">
      <i class="fa fa-sliders-h"></i> Settings
    </a>
    <div style="border-top:1px solid var(--border-lt);margin-top:1rem;padding-top:0.8rem">
      <a href="{{ url_for('main.index') }}" class="sidebar-link" target="_blank"><i class="fa fa-external-link-alt"></i> View Site</a>
      <a href="{{ url_for('admin.logout') }}" class="sidebar-link sidebar-logout"><i class="fa fa-sign-out-alt"></i> Logout</a>
    </div>
  </aside>
  <main class="admin-main">{% block admin_content %}{% endblock %}</main>
</div>
{% endblock %}
